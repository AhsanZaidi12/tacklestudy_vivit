name: vivit_pyt
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # Core — PyTorch (CUDA 12.1 build)
    - torch==2.2.2
    - torchvision==0.17.2
    - torchaudio==2.2.2
 
    # Hugging Face
    - transformers==4.51.3
    - huggingface-hub==0.30.1
    - accelerate==1.6.0
    - datasets==2.19.0
 
    # Vision Transformer utilities
    - timm==0.4.12
    - vit-pytorch==1.7.5
    - einops==0.8.0
 
    # Video I/O
    - decord==0.6.0
    - opencv-python==4.10.0.84
    - av==12.3.0
 
    # Data processing
    - numpy==1.23.5
    - pandas==2.0.3
    - scikit-learn==1.4.2
    - scipy==1.10.1
 
    # Visualization & progress
    - matplotlib==3.7.2
    - seaborn==0.13.2
    - tqdm==4.66.4
 
    # Utility
    - yacs==0.1.8
    - joblib==1.4.2
 
    # GradCAM & interpretability
    - grad-cam==1.5.5
    - captum==0.8.0
 
    # Experiment tracking
    - tensorboard==2.12.3
 
